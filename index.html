<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>farvix.rat | bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: rgba(13, 13, 13, 0.85);
            --accent: #ff00bf; 
            --border: rgba(255, 255, 255, 0.1);
            --text-secondary: #888;
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: #fff;
            font-family: 'Onest', sans-serif; display: flex;
            justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; perspective: 1200px;
        }

        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; object-fit: cover; filter: brightness(0.3);
        }

        /* Оверлей */
        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }
        #overlay.hide { opacity: 0; visibility: hidden; }
        .explore-text { letter-spacing: 6px; font-size: 11px; text-transform: uppercase; }

        /* Карточка */
        .tilt-wrapper { transform-style: preserve-3d; will-change: transform; }
        .main-card {
            width: 380px; background: var(--card-bg); backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 35px;
            padding: 40px 30px; text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            opacity: 0; transform: scale(0.9);
            transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .show .main-card { opacity: 1; transform: scale(1); }

        /* Счетчик просмотров */
        .views-counter {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255, 255, 255, 0.05); padding: 5px 12px;
            border-radius: 20px; font-size: 11px; color: var(--text-secondary);
            margin-bottom: 20px; border: 1px solid var(--border);
            transition: 0.3s;
        }
        .views-counter:hover { color: var(--accent); border-color: var(--accent); }

        .avatar-container { width: 120px; height: 120px; margin: 0 auto 25px; transform: translateZ(50px); }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--border); object-fit: cover; }

        .username { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .bio { font-size: 14px; color: var(--text-secondary); margin: 10px 0 25px; }

        /* Плеер */
        .music-widget {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            border-radius: 22px; padding: 20px; margin-bottom: 20px;
        }
        .music-header { display: flex; align-items: center; margin-bottom: 15px; }
        
        .play-btn {
            width: 32px; height: 32px; cursor: pointer;
            filter: drop-shadow(0 0 5px var(--accent));
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .play-btn:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--accent)); }
        #playPath { fill: var(--accent); transition: d 0.6s cubic-bezier(0.19, 1, 0.22, 1); }

        .track-info { font-size: 14px; font-weight: 600; margin-left: 12px; }

        /* Ползунок */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px;
            background-image: linear-gradient(var(--accent), var(--accent));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%;
            background: #fff; margin-top: -4px; box-shadow: 0 0 10px var(--accent);
        }

        .time-info { display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-top: 8px; }

        .links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 15px; padding: 15px; display: flex; justify-content: center;
            transition: 0.4s;
        }
        .btn:hover { border-color: var(--accent); background: rgba(255, 0, 191, 0.05); transform: translateY(-5px); }
        .btn svg { width: 20px; height: 20px; fill: #fff; }
    </style>
</head>
<body id="b">

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://r2.guns.lol/5b4badae-fb68-47b3-ad2f-2ee79e1a1c45.mp4" type="video/mp4">
    </video>

    <div id="overlay" onclick="enter()">
        <div class="explore-text">[ CLICK TO EXPLORE ]</div>
    </div>

    <div class="tilt-wrapper" id="t">
        <div class="main-card">
            <div class="views-counter">
                <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="currentColor"/></svg>
                <span id="viewCount">0</span>
            </div>

            <div class="avatar-container">
                <img src="https://files.catbox.moe/u6tljx.jpg" class="avatar" alt="avatar">
            </div>

            <h1 class="username">farvix.rat</h1>
            <p class="bio">#root #dev | los angeles</p>

            <div class="music-widget">
                <div class="music-header">
                    <div id="playToggle" onclick="togglePlay()" class="play-btn">
                        <svg viewBox="0 0 24 24">
                            <path id="playPath" d="M8 5v14l11-7z"></path>
                        </svg>
                    </div>
                    <div class="track-info">Yeat – On tha linë</div>
                </div>
                <input type="range" id="progress" value="0" step="0.01">
                <div class="time-info">
                    <span id="currTime">0:00</span>
                    <span id="durTime">2:34</span>
                </div>
            </div>

                <a href="#" class="btn"><svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg></a>
            </div>
        </div>
    </div>

    <audio id="m" src="https://files.catbox.moe/45ojkn.mp3" loop></audio>

    <script>
        const audio = document.getElementById('m');
        const progress = document.getElementById('progress');
        const playPath = document.getElementById('playPath');
        const viewCount = document.getElementById('viewCount');
        
        // 1. Логика счетчика (с сохранением в браузере)
        let counts = localStorage.getItem('visits') || 1542;
        counts = parseInt(counts) + 1;
        localStorage.setItem('visits', counts);
        viewCount.innerText = counts.toLocaleString();

        // Функция для накрутки через консоль: setViews(5000)
        window.setViews = (num) => {
            localStorage.setItem('visits', num);
            viewCount.innerText = num.toLocaleString();
        };

        function enter() {
            document.getElementById('overlay').classList.add('hide');
            document.getElementById('b').classList.add('show');
            audio.play();
            updateIcon(true);
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); updateIcon(true); } 
            else { audio.pause(); updateIcon(false); }
        }

        function updateIcon(isPlaying) {
            if (isPlaying) {
                playPath.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'); // Пауза
            } else {
                playPath.setAttribute('d', 'M8 5v14l11-7z'); // Плей
            }
        }

        // Обновление прогресс-бара
        audio.ontimeupdate = () => {
            const val = (audio.currentTime / audio.duration) * 100;
            progress.value = val || 0;
            progress.style.setProperty('--progress', progress.value + '%');
            
            const m = Math.floor(audio.currentTime / 60);
            const s = Math.floor(audio.currentTime % 60);
            document.getElementById('currTime').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        progress.oninput = () => {
            audio.currentTime = (progress.value / 100) * audio.duration;
        };

        // Параллакс эффект
        const el = document.getElementById('t');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * -20;
            el.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
        });
    </script>
</body>
</html>
